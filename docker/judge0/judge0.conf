# ⚠ 개발 전용 설정 — 운영 환경에서는 Docker secrets 또는 환경 변수로 대체할 것
JUDGE0_VERSION=1.13.1
# Judge0 1.13.1은 REDIS_HOST/REDIS_PORT를 사용 (REDIS_URL은 무시됨 → resque가 localhost:6379로 폴백)
# REDIS_PASSWORD는 설정하지 말 것 — 빈 문자열이면 Ruby 클라이언트가 AUTH ""를 보내 "NOAUTH" 에러 발생
REDIS_HOST=judge0-redis
REDIS_PORT=6380
POSTGRES_HOST=mathitem-postgres
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=postgres
POSTGRES_PASSWORD=postgres
RAILS_MAX_THREADS=4
RAILS_ENV=production
