services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mathitem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathitem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mathitem"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - math-item-os

  redis:
    image: redis:7
    container_name: mathitem-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - math-item-os

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: mathitem-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: mathitem-dev-master-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    networks:
      - math-item-os

  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: mathitem-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    env_file: ./docker/judge0/judge0.conf
    depends_on:
      judge0-redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2358/about"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - math-item-os
    # wait=true лӘЁл“ңм—җм„ң API м„ңлІ„к°Җ perform_nowлЎң isolateлҘј м§Ғм ‘ мӢӨн–үн•ҳлҜҖлЎң
    # мӣҢм»ӨмҷҖ лҸҷмқјн•ң namespace к¶Ңн•ңмқҙ н•„мҡ”н•ҳлӢӨ.
    privileged: true
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: mathitem-judge0-workers
    restart: unless-stopped
    command: ["./scripts/workers"]
    env_file: ./docker/judge0/judge0.conf
    depends_on:
      judge0-server:
        condition: service_healthy
    networks:
      - math-item-os
    # isolate мғҢл“ңл°•мҠӨк°Җ cgroup/namespaceлҘј мӮ¬мҡ©н•ҳлҜҖлЎң н•„мҲҳ.
    # мҡҙмҳҒ нҷҳкІҪм—җм„ңлҠ” лі„лҸ„ VM лҳҗлҠ” gVisor кІ©лҰ¬лҘј к¶ҢмһҘ.
    privileged: true
    # Ubuntu 24.04+ нҳёмҠӨнҠё(Colima VM)мқҳ AppArmorк°Җ unprivileged_userns н”„лЎңн•„лЎң
    # isolateмқҳ mountлҘј м°ЁлӢЁн•ҳлҜҖлЎң н•„мҲҳ. seccompлҸ„ н•Ёк»ҳ н•ҙм ң.
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined

  judge0-redis:
    image: redis:7
    container_name: mathitem-judge0-redis
    restart: unless-stopped
    command: ["redis-server", "--port", "6380"]
    ports:
      - "6380:6380"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - math-item-os

volumes:
  postgres_data:

networks:
  math-item-os:
    name: math-item-os
